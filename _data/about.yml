title: "About Afrax Accountants"
content: |
  Afrax Accountants is a professional accountancy firm based in London, providing a wide range of accounting, tax and business advisory services.

  Our principal, Ali Mohamed, is a qualified Chartered Certified Accountant with years of experience helping individuals and businesses manage their finances effectively.

  We pride ourselves on delivering a personal, friendly and cost-effective service tailored to each client's needs.
