hero_title: "Professional Accounting Services in London"
hero_text: "Afrax Accountants is a trusted London accountancy firm run by Ali Mohamed, a qualified Chartered Certified Accountant. We provide personal, friendly and cost-effective services to freelancers, contractors, sole traders, partnerships, and small to medium sized companies."
hero_btn: "Get a Free Consultation"
services:
  - title: "Accounts"
    description: "We assist you in making the right decision for your business, whether you are a sole trader, partnership, limited company, or LLP."
  - title: "Bookkeeping"
    description: "We keep your books straight and up to date, ensuring all records meet HMRC requirements at a competitive price."
  - title: "Business Start-up"
    description: "Whether newly started or established, we provide a pro-active approach handling PAYE, VAT, Self-Assessment and Corporation Tax."
  - title: "Tax Assistance"
    description: "We deal with HM Revenue & Customs on your behalf. With careful planning, we help lower and defer the tax you pay."
  - title: "Payroll"
    description: "Outsource your payroll to our specialists and free up time and resources to focus on running your business."
  - title: "Company Secretarial"
    description: "We handle all Companies House filings and compliance matters so you stay focused on growing your business."
